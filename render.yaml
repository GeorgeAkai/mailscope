databases:
  - name: email-visibility-db
    plan: free
    databaseName: email_visibility
    user: email_visibility

services:
  - type: web
    name: email-visibility
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: email-visibility-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-4o-mini
      - key: CRON_SECRET
        generateValue: true

  - type: cron
    name: email-visibility-sync
    runtime: node
    plan: free
    schedule: "*/15 * * * *"
    buildCommand: echo "cron"
    startCommand: curl -s -X GET "$RENDER_SERVICE_URL/api/cron/sync" -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_SERVICE_URL
        fromService:
          type: web
          name: email-visibility
          property: host
      - key: CRON_SECRET
        fromService:
          type: web
          name: email-visibility
          property: envVarValue
          envVarKey: CRON_SECRET
